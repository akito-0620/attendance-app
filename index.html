<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="出席管理">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>出席管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f2f2f7;
      color: #1c1c1e;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ===== HEADER ===== */
    .header {
      background: #fff;
      padding: 12px 16px 8px;
      padding-top: calc(12px + env(safe-area-inset-top));
      border-bottom: 1px solid #e5e5ea;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header-sub { font-size: 13px; color: #8e8e93; margin-top: 2px; }

    /* ===== NAV ===== */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-top: 1px solid #e5e5ea;
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 6px;
      border: none;
      background: none;
      cursor: pointer;
      color: #8e8e93;
      font-size: 10px;
      gap: 2px;
      transition: color 0.15s;
    }
    .nav-btn.active { color: #007aff; }
    .nav-btn svg { width: 24px; height: 24px; }

    /* ===== SCREEN ===== */
    .screen { display: none; padding: 12px 16px 90px; }
    .screen.active { display: block; }

    /* ===== ATTENDANCE SCREEN ===== */
    .controls {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .controls select, .controls input[type="date"] {
      flex: 1;
      min-width: 140px;
      padding: 8px 10px;
      border: 1px solid #e5e5ea;
      border-radius: 8px;
      font-size: 15px;
      background: #f9f9f9;
      color: #1c1c1e;
      -webkit-appearance: none;
    }

    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-card {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-num.present { color: #34c759; }
    .stat-num.absent { color: #ff3b30; }
    .stat-label { font-size: 12px; color: #8e8e93; margin-top: 2px; }

    .seat-grid-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      overflow-x: auto;
    }
    .grid-label {
      font-size: 12px;
      color: #8e8e93;
      margin-bottom: 8px;
      text-align: center;
    }
    .blackboard {
      background: #2d5a27;
      color: #fff;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .seat-grid {
      display: grid;
      gap: 6px;
      justify-content: center;
    }
    .seat {
      width: 64px;
      height: 52px;
      border-radius: 8px;
      border: 1.5px solid #e5e5ea;
      background: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      padding: 4px;
      line-height: 1.3;
      word-break: break-all;
      user-select: none;
    }
    .seat.present {
      background: #34c759;
      border-color: #28a745;
      color: #fff;
      font-weight: 600;
    }
    .seat:active { transform: scale(0.93); }
    .seat.empty {
      background: #f2f2f7;
      border-color: #e5e5ea;
      cursor: default;
      color: transparent;
    }

    .save-btn {
      width: 100%;
      padding: 14px;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .save-btn:active { background: #0062cc; transform: scale(0.98); }

    .empty-hint {
      text-align: center;
      padding: 40px 20px;
      color: #8e8e93;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ===== CLASSES SCREEN ===== */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 16px 4px 6px;
    }
    .card-list { background: #fff; border-radius: 12px; overflow: hidden; }
    .card-row {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f2f2f7;
      cursor: pointer;
      transition: background 0.1s;
    }
    .card-row:last-child { border-bottom: none; }
    .card-row:active { background: #f2f2f7; }
    .card-row-info { flex: 1; }
    .card-row-name { font-size: 16px; font-weight: 500; }
    .card-row-sub { font-size: 13px; color: #8e8e93; margin-top: 2px; }
    .card-row-arrow { color: #c7c7cc; font-size: 16px; }

    .add-btn {
      width: 100%;
      padding: 14px;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.15s;
    }
    .add-btn:active { background: #0062cc; }

    /* ===== HISTORY SCREEN ===== */
    .history-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .history-filter select {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #e5e5ea;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      color: #1c1c1e;
    }

    .history-card {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .history-header {
      padding: 12px 16px;
      border-bottom: 1px solid #f2f2f7;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .history-date { font-size: 15px; font-weight: 600; }
    .history-class { font-size: 13px; color: #8e8e93; }
    .history-stats { font-size: 14px; }
    .history-stats span { font-weight: 600; }
    .history-stats .p { color: #34c759; }
    .history-stats .a { color: #ff3b30; }
    .history-detail {
      padding: 10px 16px;
      display: none;
    }
    .history-detail.open { display: block; }
    .history-names { font-size: 13px; color: #8e8e93; line-height: 1.8; }
    .history-names strong { color: #1c1c1e; }
    .delete-btn {
      background: none;
      border: none;
      color: #ff3b30;
      font-size: 13px;
      padding: 6px 0;
      cursor: pointer;
      margin-top: 4px;
    }

    /* ===== MODAL ===== */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      justify-content: center;
      align-items: flex-end;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .form-row { margin-bottom: 14px; }
    .form-label { font-size: 13px; color: #8e8e93; margin-bottom: 4px; }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e5ea;
      border-radius: 10px;
      font-size: 16px;
      background: #f9f9f9;
      color: #1c1c1e;
    }
    .form-input:focus { outline: none; border-color: #007aff; }
    .form-row-inline { display: flex; gap: 10px; }
    .form-row-inline .form-row { flex: 1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: #f2f2f7;
      color: #007aff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-ok {
      flex: 1;
      padding: 12px;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Class edit modal - seat grid */
    .seat-hint { font-size: 12px; color: #8e8e93; margin-top: 2px; }
    .blackboard-mini {
      background: #2d5a27;
      color: #fff;
      text-align: center;
      padding: 5px;
      border-radius: 6px;
      font-size: 11px;
      margin-bottom: 6px;
    }
    .edit-seat {
      height: 48px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      padding: 3px;
      line-height: 1.2;
      word-break: break-all;
      border: 1.5px dashed #c7c7cc;
      color: #c7c7cc;
      user-select: none;
    }
    .edit-seat.occupied {
      background: #e8f4fd;
      border: 1.5px solid #007aff;
      color: #007aff;
      font-weight: 500;
    }
    .edit-seat.selected {
      outline: 3px solid #ff9500;
      outline-offset: 1px;
    }
    .edit-seat:active { transform: scale(0.92); }
    .delete-class-btn {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #ff3b30;
      border: 1px solid #ff3b30;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1 id="headerTitle">出席確認</h1>
  <div class="header-sub" id="headerSub"></div>
</div>

<!-- SCREENS -->
<div id="screenAttendance" class="screen active">
  <div class="controls">
    <select id="classSelect" onchange="onClassChange()"></select>
    <input type="date" id="dateInput" onchange="onDateChange()">
  </div>
  <div id="attendanceContent"></div>
</div>

<div id="screenClasses" class="screen">
  <div class="section-title">登録クラス</div>
  <div class="card-list" id="classList"></div>
  <button class="add-btn" onclick="openNewClassModal()">＋ 新しいクラスを追加</button>
</div>

<div id="screenHistory" class="screen">
  <div class="history-filter">
    <select id="historyClassFilter" onchange="renderHistory()">
      <option value="">全クラス</option>
    </select>
  </div>
  <div id="historyList"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <button class="nav-btn active" id="navAttendance" onclick="showScreen('attendance')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    出席
  </button>
  <button class="nav-btn" id="navClasses" onclick="showScreen('classes')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    クラス
  </button>
  <button class="nav-btn" id="navHistory" onclick="showScreen('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    履歴
  </button>
</nav>

<!-- MODAL: New/Edit Class -->
<div class="modal-backdrop" id="classModal">
  <div class="modal">
    <div class="modal-title" id="classModalTitle">新しいクラス</div>
    <div class="form-row">
      <div class="form-label">クラス名</div>
      <input class="form-input" id="classNameInput" placeholder="例：中3Aクラス" type="text">
    </div>
    <div class="form-row-inline">
      <div class="form-row">
        <div class="form-label">列数（横）</div>
        <input class="form-input" id="classColsInput" type="number" min="1" max="10" value="6" onchange="renderEditGrid()">
      </div>
      <div class="form-row">
        <div class="form-label">行数（縦）</div>
        <input class="form-input" id="classRowsInput" type="number" min="1" max="10" value="5" onchange="renderEditGrid()">
      </div>
    </div>
    <div class="form-row">
      <div class="form-label">座席配置（<span id="studentCount">0</span>名登録済み）</div>
      <div class="seat-hint">空の席をタップして生徒を配置できます</div>
      <div id="editSeatGrid" style="overflow-x:auto; margin-top:8px;"></div>
      <div id="seatInputBar" style="display:none; margin-top:10px;">
        <div class="form-label" id="seatInputLabel">生徒名を入力</div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <input class="form-input" id="seatNameInput" placeholder="名前" type="text" style="flex:1;" onkeydown="if(event.key==='Enter')confirmSeatAssign()">
          <button class="btn-ok" style="flex:0;padding:10px 14px;border-radius:10px;" onclick="confirmSeatAssign()">登録</button>
          <button class="btn-cancel" style="flex:0;padding:10px 14px;border-radius:10px;" onclick="cancelSeatInput()">×</button>
        </div>
        <button id="seatDeleteBtn" class="delete-class-btn" style="display:none;margin-top:6px;" onclick="deleteSeat()">この席の生徒を削除</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeClassModal()">キャンセル</button>
      <button class="btn-ok" onclick="saveClass()">保存</button>
    </div>
    <button class="delete-class-btn" id="deleteClassBtn" onclick="deleteCurrentClass()" style="display:none">
      このクラスを削除
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let state = {
  screen: 'attendance',
  classes: [],
  records: [],
  currentClassId: null,
  currentDate: todayStr(),
  presentIds: new Set(),
  editingClassId: null,
  editingStudents: [],
};

// ===== STORAGE =====
function loadData() {
  try {
    const raw = localStorage.getItem('juku_attendance_v1');
    if (raw) {
      const d = JSON.parse(raw);
      state.classes = d.classes || [];
      state.records = d.records || [];
    }
  } catch(e) {}
  // 旧データの移行: row/colがない生徒にインデックスから位置を割り当て
  state.classes.forEach(cls => {
    cls.students.forEach((s, i) => {
      if (s.row === undefined || s.col === undefined) {
        s.row = Math.floor(i / (cls.cols || 6));
        s.col = i % (cls.cols || 6);
      }
    });
  });
  if (state.classes.length > 0) {
    state.currentClassId = state.classes[0].id;
  }
}

function saveData() {
  localStorage.setItem('juku_attendance_v1', JSON.stringify({
    classes: state.classes,
    records: state.records
  }));
}

// ===== UTILS =====
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

function formatDateJP(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== NAVIGATION =====
function showScreen(name) {
  state.screen = name;
  ['attendance','classes','history'].forEach(s => {
    document.getElementById('screen' + capitalize(s)).classList.toggle('active', s === name);
    document.getElementById('nav' + capitalize(s)).classList.toggle('active', s === name);
  });
  if (name === 'attendance') { renderAttendance(); updateHeader(); }
  if (name === 'classes') { renderClasses(); updateHeader(); }
  if (name === 'history') { renderHistory(); updateHeader(); }
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function updateHeader() {
  const titles = { attendance: '出席確認', classes: 'クラス管理', history: '出席履歴' };
  document.getElementById('headerTitle').textContent = titles[state.screen];
  if (state.screen === 'attendance') {
    document.getElementById('headerSub').textContent = formatDateJP(state.currentDate);
  } else {
    document.getElementById('headerSub').textContent = '';
  }
}

// ===== ATTENDANCE SCREEN =====
function renderAttendance() {
  // Class select
  const sel = document.getElementById('classSelect');
  sel.innerHTML = state.classes.length === 0
    ? '<option value="">クラスを追加してください</option>'
    : state.classes.map(c => `<option value="${c.id}" ${c.id === state.currentClassId ? 'selected' : ''}>${c.name}</option>`).join('');

  // Date input
  document.getElementById('dateInput').value = state.currentDate;

  // Load existing record if any
  loadAttendanceRecord();

  renderAttendanceContent();
}

function loadAttendanceRecord() {
  if (!state.currentClassId) return;
  const rec = state.records.find(r => r.classId === state.currentClassId && r.date === state.currentDate);
  if (rec) {
    state.presentIds = new Set(rec.presentIds);
  } else {
    state.presentIds = new Set();
  }
}

function renderAttendanceContent() {
  const container = document.getElementById('attendanceContent');
  const cls = state.classes.find(c => c.id === state.currentClassId);

  if (!cls) {
    container.innerHTML = '<div class="empty-hint">まずクラスを作成してください。<br>下の「クラス」タブからクラスと生徒を登録できます。</div>';
    return;
  }

  const total = cls.students.length;
  const presentCount = [...state.presentIds].filter(id => cls.students.some(s => s.id === id)).length;
  const absentCount = total - presentCount;

  const cols = cls.cols || 6;

  // Build grid cells using row/col positions
  let seats = '';
  for (let r = 0; r < cls.rows; r++) {
    for (let c = 0; c < cols; c++) {
      const student = cls.students.find(s => s.row === r && s.col === c);
      if (student) {
        const isPresent = state.presentIds.has(student.id);
        seats += `<div class="seat ${isPresent ? 'present' : ''}" onclick="toggleSeat('${student.id}')">${escapeHtml(student.name)}</div>`;
      } else {
        seats += `<div class="seat empty">　</div>`;
      }
    }
  }

  container.innerHTML = `
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num present">${presentCount}</div>
        <div class="stat-label">出席</div>
      </div>
      <div class="stat-card">
        <div class="stat-num absent">${absentCount}</div>
        <div class="stat-label">欠席</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:#1c1c1e">${total}</div>
        <div class="stat-label">合計</div>
      </div>
    </div>
    <div class="seat-grid-wrap">
      <div class="blackboard">黒　板</div>
      <div class="seat-grid" style="grid-template-columns: repeat(${cols}, 64px)">
        ${seats}
      </div>
      <div class="grid-label" style="margin-top:8px">緑 = 出席　白 = 欠席</div>
    </div>
    <button class="save-btn" onclick="saveAttendance()">出席を保存</button>
  `;
}

function toggleSeat(studentId) {
  if (state.presentIds.has(studentId)) {
    state.presentIds.delete(studentId);
  } else {
    state.presentIds.add(studentId);
  }
  renderAttendanceContent();
}

function onClassChange() {
  state.currentClassId = document.getElementById('classSelect').value;
  loadAttendanceRecord();
  renderAttendanceContent();
}

function onDateChange() {
  state.currentDate = document.getElementById('dateInput').value;
  updateHeader();
  loadAttendanceRecord();
  renderAttendanceContent();
}

function saveAttendance() {
  if (!state.currentClassId) return;
  const existing = state.records.findIndex(r => r.classId === state.currentClassId && r.date === state.currentDate);
  const record = {
    id: existing >= 0 ? state.records[existing].id : uid(),
    date: state.currentDate,
    classId: state.currentClassId,
    presentIds: [...state.presentIds],
    savedAt: new Date().toISOString()
  };
  if (existing >= 0) {
    state.records[existing] = record;
  } else {
    state.records.push(record);
  }
  saveData();
  showToast('保存しました ✓');
}

// ===== CLASSES SCREEN =====
function renderClasses() {
  const list = document.getElementById('classList');
  if (state.classes.length === 0) {
    list.innerHTML = '<div class="card-row"><div class="card-row-info"><div class="card-row-sub">クラスがありません</div></div></div>';
    return;
  }
  list.innerHTML = state.classes.map(c => `
    <div class="card-row" onclick="openEditClassModal('${c.id}')">
      <div class="card-row-info">
        <div class="card-row-name">${escapeHtml(c.name)}</div>
        <div class="card-row-sub">${c.students.length}名 ／ ${c.rows}行 × ${c.cols}列</div>
      </div>
      <div class="card-row-arrow">›</div>
    </div>
  `).join('');
}

// ===== CLASS MODAL =====
function openNewClassModal() {
  state.editingClassId = null;
  state.editingStudents = [];
  selectedSeatPos = null;
  document.getElementById('classModalTitle').textContent = '新しいクラス';
  document.getElementById('classNameInput').value = '';
  document.getElementById('classColsInput').value = '6';
  document.getElementById('classRowsInput').value = '5';
  document.getElementById('deleteClassBtn').style.display = 'none';
  document.getElementById('seatInputBar').style.display = 'none';
  renderEditGrid();
  document.getElementById('classModal').classList.add('open');
  document.getElementById('classNameInput').focus();
}

function openEditClassModal(classId) {
  const cls = state.classes.find(c => c.id === classId);
  if (!cls) return;
  state.editingClassId = classId;
  state.editingStudents = cls.students.map(s => ({...s}));
  selectedSeatPos = null;
  document.getElementById('classModalTitle').textContent = 'クラス編集';
  document.getElementById('classNameInput').value = cls.name;
  document.getElementById('classColsInput').value = cls.cols;
  document.getElementById('classRowsInput').value = cls.rows;
  document.getElementById('deleteClassBtn').style.display = 'block';
  document.getElementById('seatInputBar').style.display = 'none';
  renderEditGrid();
  document.getElementById('classModal').classList.add('open');
}

function closeClassModal() {
  document.getElementById('classModal').classList.remove('open');
  state.editingStudents = [];
  state.editingClassId = null;
}

let selectedSeatPos = null; // { row, col }

function renderEditGrid() {
  const cols = Math.max(1, Math.min(10, parseInt(document.getElementById('classColsInput').value) || 6));
  const rows = Math.max(1, Math.min(10, parseInt(document.getElementById('classRowsInput').value) || 5));
  document.getElementById('studentCount').textContent = state.editingStudents.length;

  let html = `<div class="blackboard-mini">黒　板</div>`;
  html += `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:5px;">`;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const student = state.editingStudents.find(s => s.row === r && s.col === c);
      const isSel = selectedSeatPos && selectedSeatPos.row === r && selectedSeatPos.col === c;
      if (student) {
        html += `<div class="edit-seat occupied${isSel ? ' selected' : ''}" onclick="clickEditSeat(${r},${c})">${escapeHtml(student.name)}</div>`;
      } else {
        html += `<div class="edit-seat${isSel ? ' selected' : ''}" onclick="clickEditSeat(${r},${c})">＋</div>`;
      }
    }
  }
  html += '</div>';
  document.getElementById('editSeatGrid').innerHTML = html;
}

function clickEditSeat(row, col) {
  selectedSeatPos = { row, col };
  const student = state.editingStudents.find(s => s.row === row && s.col === col);
  const bar = document.getElementById('seatInputBar');
  const label = document.getElementById('seatInputLabel');
  const input = document.getElementById('seatNameInput');
  const delBtn = document.getElementById('seatDeleteBtn');

  bar.style.display = 'block';
  label.textContent = `${row + 1}行 ${col + 1}列 — 生徒名を入力`;
  input.value = student ? student.name : '';
  delBtn.style.display = student ? 'block' : 'none';
  renderEditGrid();
  input.focus();
}

function confirmSeatAssign() {
  if (!selectedSeatPos) return;
  const name = document.getElementById('seatNameInput').value.trim();
  if (!name) { showToast('名前を入力してください'); return; }
  const { row, col } = selectedSeatPos;
  // 既存の生徒を同じ席から削除してから追加
  state.editingStudents = state.editingStudents.filter(s => !(s.row === row && s.col === col));
  state.editingStudents.push({ id: uid(), name, row, col });
  cancelSeatInput();
}

function cancelSeatInput() {
  selectedSeatPos = null;
  document.getElementById('seatInputBar').style.display = 'none';
  document.getElementById('seatNameInput').value = '';
  renderEditGrid();
}

function deleteSeat() {
  if (!selectedSeatPos) return;
  const { row, col } = selectedSeatPos;
  state.editingStudents = state.editingStudents.filter(s => !(s.row === row && s.col === col));
  cancelSeatInput();
}

function saveClass() {
  const name = document.getElementById('classNameInput').value.trim();
  if (!name) { showToast('クラス名を入力してください'); return; }
  const cols = Math.max(1, Math.min(10, parseInt(document.getElementById('classColsInput').value) || 6));
  const rows = Math.max(1, Math.min(10, parseInt(document.getElementById('classRowsInput').value) || 5));

  if (state.editingClassId) {
    const idx = state.classes.findIndex(c => c.id === state.editingClassId);
    if (idx >= 0) {
      state.classes[idx] = { ...state.classes[idx], name, cols, rows, students: state.editingStudents };
    }
  } else {
    const newClass = { id: uid(), name, cols, rows, students: state.editingStudents };
    state.classes.push(newClass);
    state.currentClassId = newClass.id;
  }
  saveData();
  closeClassModal();
  renderClasses();
  showToast('保存しました ✓');
}

function deleteCurrentClass() {
  if (!state.editingClassId) return;
  const cls = state.classes.find(c => c.id === state.editingClassId);
  if (!confirm(`「${cls.name}」を削除しますか？\n出席記録も全て削除されます。`)) return;
  state.classes = state.classes.filter(c => c.id !== state.editingClassId);
  state.records = state.records.filter(r => r.classId !== state.editingClassId);
  if (state.currentClassId === state.editingClassId) {
    state.currentClassId = state.classes.length > 0 ? state.classes[0].id : null;
  }
  saveData();
  closeClassModal();
  renderClasses();
  showToast('削除しました');
}

// ===== HISTORY SCREEN =====
function renderHistory() {
  // Update filter options
  const filter = document.getElementById('historyClassFilter');
  const currentFilter = filter.value;
  filter.innerHTML = '<option value="">全クラス</option>' +
    state.classes.map(c => `<option value="${c.id}" ${c.id === currentFilter ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');

  const filterClassId = filter.value;
  let records = [...state.records];
  if (filterClassId) records = records.filter(r => r.classId === filterClassId);
  records.sort((a, b) => b.date.localeCompare(a.date));

  const list = document.getElementById('historyList');
  if (records.length === 0) {
    list.innerHTML = '<div class="empty-hint">出席記録がありません。<br>出席タブで出席を記録して保存してください。</div>';
    return;
  }

  list.innerHTML = records.map(rec => {
    const cls = state.classes.find(c => c.id === rec.classId);
    const className = cls ? cls.name : '（削除済みクラス）';
    const total = cls ? cls.students.length : rec.presentIds.length;
    const presentCount = cls
      ? rec.presentIds.filter(id => cls.students.some(s => s.id === id)).length
      : rec.presentIds.length;
    const absentCount = total - presentCount;

    const presentNames = cls
      ? rec.presentIds.map(id => cls.students.find(s => s.id === id)?.name).filter(Boolean)
      : [];
    const absentNames = cls
      ? cls.students.filter(s => !rec.presentIds.includes(s.id)).map(s => s.name)
      : [];

    return `
      <div class="history-card">
        <div class="history-header" onclick="toggleHistoryDetail('${rec.id}')">
          <div>
            <div class="history-date">${formatDateJP(rec.date)}</div>
            <div class="history-class">${escapeHtml(className)}</div>
          </div>
          <div class="history-stats">
            <span class="p">${presentCount}出席</span> / <span class="a">${absentCount}欠席</span>
          </div>
        </div>
        <div class="history-detail" id="detail_${rec.id}">
          <div class="history-names">
            <strong>出席 (${presentCount}名)：</strong>
            ${presentNames.length > 0 ? escapeHtml(presentNames.join('、')) : 'なし'}
          </div>
          <div class="history-names" style="margin-top:6px">
            <strong>欠席 (${absentCount}名)：</strong>
            ${absentNames.length > 0 ? escapeHtml(absentNames.join('、')) : 'なし'}
          </div>
          <button class="delete-btn" onclick="deleteRecord('${rec.id}')">この記録を削除</button>
        </div>
      </div>
    `;
  }).join('');
}

function toggleHistoryDetail(id) {
  document.getElementById('detail_' + id)?.classList.toggle('open');
}

function deleteRecord(id) {
  if (!confirm('この出席記録を削除しますか？')) return;
  state.records = state.records.filter(r => r.id !== id);
  saveData();
  renderHistory();
  showToast('削除しました');
}

// ===== HELPERS =====
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modal on backdrop click
document.getElementById('classModal').addEventListener('click', function(e) {
  if (e.target === this) closeClassModal();
});

// ===== INIT =====
loadData();
updateHeader();
renderAttendance();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
